<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tienda de frutas</title>
    <link rel="stylesheet" href="css/styles.css">
    <script defer src="js/main.js"></script>
</head>

<body>

    <!-- Header -->
    <header class="header">

        <a href="index.html">
            <div class="logo">Frutería</div>
        </a>
        
        <div class="nombreAlumno"></div>
        
        <input type="text" placeholder="Buscar..." class="barra-busqueda">
        
        <div class="carrito">
            <span>Carrito: <span id="contador-carrito">0</span> productos</span>
        </div>
    </header>

    <!-- Contenedor principal -->
    <main>
		<section class="seccion-productos">
		    <h2>Nuestras frutas</h2>
            <div class="btns-ordenar">
                <button type="button" class="ordenar" id="A-Z">Ordenar por nombre A-Z</button>
                <button type="button" class="ordenar" id="Z-A">Ordenar por nombre Z-A</button>
                <button type="button" class="ordenar" id="menorPrecio">Ordenar por menor precio</button>
                <button type="button" class="ordenar" id="mayorPrecio">Ordenar por mayor precio</button>
            </div>
		    <div class="contenedor-productos"></div>
		</section>

		<!-- Seccion carrito -->
		<section class="seccion-carrito">
		    <h2>Carrito</h2>
		    
		    <div id="items-carrito">
		        <p>No hay elementos en el carrito.</p>
		    </div>

		    <div class="total-carrito">
		        <p>Total: <span id="precio-total">$0.00</span></p>
		    </div>
		</section>

    </main>

    <footer>
        <p>&copy; 2026 Pracica Parcial | Franco Segovia</p>
    </footer>
</body>
</html>
